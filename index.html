<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Zyths AI - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background: #1a0a1a;
            font-family: 'Poppins', 'Inter', sans-serif;
            overflow: hidden;
        }

        /* INTRO BOOTING SCREEN */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .intro-screen.hide {
            opacity: 0;
            visibility: hidden;
        }
        .intro-content {
            text-align: center;
        }
        .intro-text {
            color: #b87ab8;
            font-size: clamp(1rem, 6vw, 1.5rem);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .booting-text {
            margin-right: 8px;
        }
        .dots {
            display: inline-flex;
            gap: 6px;
        }
        .dots span {
            font-size: clamp(1rem, 6vw, 1.5rem);
            animation: softBlink 2s infinite ease-in-out;
            opacity: 0;
            display: inline-block;
        }
        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.4s; }
        .dots span:nth-child(3) { animation-delay: 0.8s; }

        @keyframes softBlink {
            0%, 100% { opacity: 0.15; transform: translateY(0);}
            50% { opacity: 1; transform: translateY(-3px);}
        }

        /* LAYOUT UTAMA */
        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* SIDEBAR - MODAL UNTUK HP */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 25;
            display: none;
        }
        .sidebar-overlay.show {
            display: block;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #1f0a1f;
            border-right: 1px solid #4a104a;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
            z-index: 30;
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #4a104a;
            background: #2d0a2d;
        }
        .new-chat-btn {
            width: 100%;
            background: linear-gradient(135deg, #712375 0%, #47104a 100%);
            border: none;
            color: #d4a0d4;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .new-chat-btn:hover {
            opacity: 0.85;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .chat-item {
            background: #2a0a2a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid #4a104a;
            transition: all 0.2s;
            user-select: none;
        }
        .chat-item.active {
            background: linear-gradient(135deg, #712375 0%, #47104a 100%);
            border-color: #8a4a8a;
        }
        .chat-item.active .chat-title {
            color: white;
        }
        .chat-item.press {
            transform: scale(0.98);
            opacity: 0.7;
        }
        .chat-title {
            color: #c97ac9;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* MAIN CHAT AREA */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a0a1a;
            height: 100%;
            width: 100%;
        }
        .chat-header {
            background: linear-gradient(135deg, #712375 0%, #47104a 100%);
            padding: 12px 16px;
            border-bottom: 1px solid #4a104a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 10px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-btn {
            background: transparent;
            border: 1px solid #8a4a8a;
            color: #d4a0d4;
            font-size: 20px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .chat-header h1 {
            color: #d4a0d4;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }
        .api-system-btn {
            background: #2d0a2d;
            border: 1px solid #4a104a;
            color: #c97ac9;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #1a0a1a;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { align-self: flex-end; }
        .message.bot { align-self: flex-start; }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
            line-height: 1.45;
            word-wrap: break-word;
            font-family: 'Inter', sans-serif;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #712375 0%, #47104a 100%);
            color: #e8c8e8;
            border-bottom-right-radius: 5px;
        }
        .message.bot .bubble {
            background: #2d0a2d;
            color: #c97ac9;
            border-bottom-left-radius: 5px;
            border: 1px solid #4a104a;
        }
        .message-name {
            font-size: 9px;
            margin-bottom: 4px;
            padding-left: 8px;
            color: #9a6a9a;
        }
        .message.user .message-name {
            text-align: right;
            color: #d4a0d4;
        }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 10px 14px;
            background: #2d0a2d;
            border-radius: 20px;
            width: fit-content;
            border: 1px solid #4a104a;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #c97ac9;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* API INPUT */
        .api-input {
            background: #1a0a1a;
            padding: 8px 12px;
            border-top: 1px solid #3a0a3a;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .api-input.hide { display: none; }
        .api-input input {
            flex: 1;
            background: #2d0a2d;
            border: 1px solid #4a104a;
            color: #c97ac9;
            padding: 8px 12px;
            border-radius: 25px;
            font-size: 11px;
            outline: none;
        }
        .api-input button {
            background: #3a0a3a;
            border: 1px solid #4a104a;
            color: #c97ac9;
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
        }

        /* INPUT AREA */
        .input-area {
            background: #1a0a1a;
            padding: 10px;
            border-top: 1px solid #3a0a3a;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #2d0a2d;
            border: 1px solid #4a104a;
            color: #c97ac9;
            padding: 10px 14px;
            border-radius: 30px;
            font-size: 13px;
            outline: none;
        }
        .input-area input:focus { border-color: #8a4a8a; }
        .input-area input::placeholder {
            color: #6a4a6a;
            font-size: 12px;
        }
        .btn-send {
            background: linear-gradient(135deg, #712375 0%, #47104a 100%);
            border: none;
            color: #e8c8e8;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: opacity 0.2s;
        }
        .btn-send:hover {
            opacity: 0.85;
        }
        .btn-send:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <!-- INTRO BOOTING -->
    <div class="intro-screen" id="introScreen">
        <div class="intro-content">
            <div class="intro-text">
                <span class="booting-text">Zyths AI is booting</span>
                <span class="dots"><span>.</span><span>.</span><span>.</span></span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- SIDEBAR OVERLAY -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- MAIN CHAT -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="header-left">
                    <button class="menu-btn" id="menuBtn">☰</button>
                    <h1>Zyths AI</h1>
                </div>
                <button class="api-system-btn" id="apiSystemBtn">API System</button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-name">Zyths AI</div>
                    <div class="bubble">Halo!, saya Zyths AI. Ada yang bisa saya bantu?</div>
                </div>
            </div>

            <div class="api-input" id="apiInputContainer">
                <input type="text" id="apiKeyInput" placeholder="Masukkan API Key Google Gemini..." autocomplete="off">
                <button id="saveApiBtn">Simpan</button>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ketik pertanyaanmu di sini..." autofocus>
                <button class="btn-send" id="sendBtn">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        // INTRO
        const introScreen = document.getElementById('introScreen');
        setTimeout(() => introScreen.classList.add('hide'), 5000);

        // DATA
        let chats = [];
        let activeChatId = null;
        let API_KEY = localStorage.getItem('zythsai_api_key') || '';
        let longPressTimer = null;
        let currentPressItem = null;

        // SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
        function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
        document.getElementById('menuBtn').onclick = openSidebar;
        overlay.onclick = closeSidebar;

        // LOAD & SAVE
        function loadChats() {
            const saved = localStorage.getItem('zythsai_chats');
            if (saved) {
                chats = JSON.parse(saved);
            } else {
                chats = [{
                    id: Date.now().toString(),
                    title: "Obrolan Baru",
                    messages: [{ role: "assistant", content: "Halo!, saya Zyths AI. Ada yang bisa saya bantu?" }]
                }];
            }
            activeChatId = localStorage.getItem('zythsai_activeChat') || chats[0]?.id;
            if (!chats.find(c => c.id === activeChatId) && chats.length) activeChatId = chats[0].id;
            saveChats();
            renderChatList();
            renderCurrentChat();
        }
        function saveChats() {
            localStorage.setItem('zythsai_chats', JSON.stringify(chats));
            localStorage.setItem('zythsai_activeChat', activeChatId);
        }
        
        function renderChatList() {
            const container = document.getElementById('chatList');
            if (!container) return;
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === activeChatId ? 'active' : ''}`;
                div.innerHTML = `<span class="chat-title">${escapeHtml(chat.title)}</span>`;
                
                // Klik biasa untuk pindah obrolan
                div.onclick = (e) => {
                    e.stopPropagation();
                    activeChatId = chat.id;
                    saveChats();
                    renderChatList();
                    renderCurrentChat();
                    closeSidebar();
                };
                
                // LONG PRESS untuk hapus obrolan
                div.ontouchstart = (e) => {
                    e.preventDefault();
                    currentPressItem = div;
                    div.classList.add('press');
                    longPressTimer = setTimeout(() => {
                        if (currentPressItem === div) {
                            if (chats.length === 1) {
                                alert("Tidak bisa menghapus obrolan terakhir!");
                            } else {
                                if (confirm(`Hapus obrolan "${chat.title}"?`)) {
                                    chats = chats.filter(c => c.id !== chat.id);
                                    if (activeChatId === chat.id) activeChatId = chats[0].id;
                                    saveChats();
                                    renderChatList();
                                    renderCurrentChat();
                                }
                            }
                        }
                        div.classList.remove('press');
                        currentPressItem = null;
                    }, 500);
                };
                
                div.ontouchend = () => {
                    clearTimeout(longPressTimer);
                    div.classList.remove('press');
                    currentPressItem = null;
                };
                
                div.ontouchmove = () => {
                    clearTimeout(longPressTimer);
                    div.classList.remove('press');
                    currentPressItem = null;
                };
                
                // Support mouse (untuk debugging di PC)
                div.onmousedown = (e) => {
                    currentPressItem = div;
                    div.classList.add('press');
                    longPressTimer = setTimeout(() => {
                        if (currentPressItem === div) {
                            if (chats.length === 1) {
                                alert("Tidak bisa menghapus obrolan terakhir!");
                            } else {
                                if (confirm(`Hapus obrolan "${chat.title}"?`)) {
                                    chats = chats.filter(c => c.id !== chat.id);
                                    if (activeChatId === chat.id) activeChatId = chats[0].id;
                                    saveChats();
                                    renderChatList();
                                    renderCurrentChat();
                                }
                            }
                        }
                        div.classList.remove('press');
                        currentPressItem = null;
                    }, 500);
                };
                
                div.onmouseup = () => {
                    clearTimeout(longPressTimer);
                    div.classList.remove('press');
                    currentPressItem = null;
                };
                
                div.onmouseleave = () => {
                    clearTimeout(longPressTimer);
                    div.classList.remove('press');
                    currentPressItem = null;
                };
                
                container.appendChild(div);
            });
        }
        
        function escapeHtml(text) { 
            return text.replace(/[&<>]/g, function(m) { 
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]; 
            }); 
        }
        
        function renderCurrentChat() {
            const chat = chats.find(c => c.id === activeChatId);
            if (!chat) return;
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            chat.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
                div.innerHTML = `<div class="message-name">${msg.role === 'user' ? 'Kamu' : 'Zyths AI'}</div><div class="bubble">${msg.role === 'user' ? escapeHtml(msg.content).replace(/\n/g,'<br>') : parseMarkdown(msg.content)}</div>`;
                container.appendChild(div);
            });
            setTimeout(() => container.scrollTop = container.scrollHeight, 100);
        }

        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: "Obrolan Baru",
                messages: [{ role: "assistant", content: "Halo!, saya Zyths AI. Ada yang bisa saya bantu?" }]
            };
            chats.unshift(newChat);
            activeChatId = newChat.id;
            saveChats();
            renderChatList();
            renderCurrentChat();
            closeSidebar();
        }
        document.getElementById('newChatBtn').onclick = createNewChat;

        function addMessageToChat(text, isUser = true) {
            const chat = chats.find(c => c.id === activeChatId);
            if (!chat) return;
            chat.messages.push({ role: isUser ? 'user' : 'assistant', content: text });
            if (isUser && chat.messages.filter(m => m.role === 'user').length === 1) {
                chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
            }
            saveChats();
            renderChatList();
            renderCurrentChat();
        }

        function parseMarkdown(text) {
            let html = text;
            html = html.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
            html = html.replace(/^[\*\-\•]\s+(.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>\n?)+/g, '<ul>$&</ul>');
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            html = html.replace(/\*{1,2}/g, '');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            const typing = document.createElement('div');
            typing.className = 'message bot';
            typing.id = 'typingIndicator';
            typing.innerHTML = `<div class="message-name">Zyths AI</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }
        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function callGeminiAPI(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (!res.ok) throw new Error((await res.json()).error?.message || 'API Error');
            return (await res.json()).candidates[0].content.parts[0].text;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;
            if (!API_KEY) {
                addMessageToChat("⚠️ Masukkan API Key Google Gemini dulu!", false);
                input.value = '';
                return;
            }
            addMessageToChat(msg, true);
            input.value = '';
            input.blur();
            showTyping();
            try {
                const reply = await callGeminiAPI(msg);
                hideTyping();
                addMessageToChat(reply, false);
            } catch (err) {
                hideTyping();
                addMessageToChat(`❌ ${err.message}`, false);
            }
        }
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('userInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });

        // API SYSTEM
        const apiContainer = document.getElementById('apiInputContainer');
        if (API_KEY) apiContainer.classList.add('hide');
        document.getElementById('apiSystemBtn').onclick = () => {
            if (confirm("Reset API Key?")) {
                localStorage.removeItem('zythsai_api_key');
                API_KEY = '';
                apiContainer.classList.remove('hide');
                document.getElementById('apiKeyInput').value = '';
                addMessageToChat("🔑 API Key direset. Masukkan API Key baru.", false);
            }
        };
        document.getElementById('saveApiBtn').onclick = () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key && key.startsWith('AIza')) {
                API_KEY = key;
                localStorage.setItem('zythsai_api_key', key);
                apiContainer.classList.add('hide');
                addMessageToChat("✅ API Key berhasil disimpan!", false);
            } else {
                addMessageToChat("❌ API Key tidak valid!", false);
            }
        };

        loadChats();
        document.getElementById('userInput').focus();
    </script>
</body>
    </html>
