<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Zyths AI - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background: linear-gradient(135deg, #1a0a1a 0%, #2d1a2d 100%);
            font-family: 'Poppins', 'Inter', sans-serif;
            overflow: hidden;
        }

        /* INTRO BOOTING SCREEN */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a0a1a 0%, #2d1a2d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .intro-screen.hide {
            opacity: 0;
            visibility: hidden;
        }
        .intro-content {
            text-align: center;
        }
        .intro-text {
            color: #e8b0e8;
            font-size: clamp(1rem, 6vw, 1.5rem);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .booting-text {
            margin-right: 8px;
        }
        .dots {
            display: inline-flex;
            gap: 6px;
        }
        .dots span {
            font-size: clamp(1rem, 6vw, 1.5rem);
            animation: softBlink 2s infinite ease-in-out;
            opacity: 0;
            display: inline-block;
        }
        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.4s; }
        .dots span:nth-child(3) { animation-delay: 0.8s; }

        @keyframes softBlink {
            0%, 100% { opacity: 0.15; transform: translateY(0);}
            50% { opacity: 1; transform: translateY(-3px);}
        }

        /* Layout Utama */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* SIDEBAR KIRI (Chat List) */
        .sidebar {
            width: 280px;
            background: #1f0f1f;
            border-right: 1px solid #712375;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #712375;
            background: #2d1a2d;
        }

        .new-chat-btn {
            width: 100%;
            background: linear-gradient(135deg, #712375 0%, #9b4d9e 100%);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            background: #2a122a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #4a1a4d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover {
            background: #3a1a3d;
            border-color: #9b4d9e;
        }

        .chat-item.active {
            background: #712375;
            border-color: #e8b0e8;
        }

        .chat-item.active .chat-title {
            color: white;
        }

        .chat-title {
            color: #e8b0e8;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-chat {
            background: transparent;
            border: none;
            color: #b86bb8;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .delete-chat:hover {
            background: #e74c3c;
            color: white;
        }

        /* MAIN CHAT AREA */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2d1a2d;
            height: 100vh;
        }

        .chat-header {
            background: linear-gradient(135deg, #712375 0%, #4a1a4d 100%);
            padding: 14px 20px;
            border-bottom: 2px solid #9b4d9e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header h1 {
            color: #e8b0e8;
            font-size: clamp(1rem, 4.5vw, 1.3rem);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        .api-system-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid #9b4d9e;
            color: #e8b0e8;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #2a122a;
            min-height: 0;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #4a1a4d;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #9b4d9e;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.user { align-self: flex-end; }
        .message.bot { align-self: flex-start; }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: clamp(12px, 3.5vw, 14px);
            line-height: 1.45;
            word-wrap: break-word;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #712375 0%, #9b4d9e 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message.bot .bubble {
            background: #4a1a4d;
            color: #e8b0e8;
            border-bottom-left-radius: 5px;
            border: 1px solid #712375;
        }
        .message.bot .bubble strong {
            color: #e8b0e8;
            font-weight: 700;
        }
        .message.bot .bubble em {
            color: #c97bc9;
            font-style: italic;
        }
        .message.bot .bubble ul, .message.bot .bubble ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        .message.bot .bubble li {
            margin: 4px 0;
        }
        .message.bot .bubble hr {
            margin: 10px 0;
            border: none;
            height: 1px;
            background: #712375;
        }
        .message.bot .bubble code {
            background: #1a0a1a;
            padding: 2px 6px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .message-name {
            font-size: clamp(9px, 3vw, 10px);
            margin-bottom: 4px;
            padding-left: 8px;
            color: #b86bb8;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }
        .message.user .message-name {
            text-align: right;
            color: #c97bc9;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 10px 14px;
            background: #4a1a4d;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            width: fit-content;
            border: 1px solid #712375;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #e8b0e8;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* API INPUT */
        .api-input {
            background: #2a122a;
            padding: 10px 12px;
            border-top: 1px solid #4a1a4d;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .api-input.hide {
            display: none;
        }
        .api-input input {
            flex: 1;
            background: #1a0a1a;
            border: 1px solid #712375;
            color: #e8b0e8;
            padding: 8px 12px;
            border-radius: 25px;
            font-size: 11px;
            font-family: 'Inter', monospace;
            outline: none;
        }
        .api-input input::placeholder {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
        }
        .api-input button {
            background: #4a1a4d;
            border: 1px solid #712375;
            color: #e8b0e8;
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            font-size: 11px;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .api-input button:hover { background: #712375; }

        /* INPUT AREA */
        .input-area {
            background: #2d1a2d;
            padding: 12px;
            border-top: 2px solid #712375;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #1a0a1a;
            border: 2px solid #712375;
            color: #e8b0e8;
            padding: 10px 14px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: clamp(12px, 3.5vw, 14px);
            outline: none;
            min-width: 0;
        }
        .input-area input:focus { border-color: #9b4d9e; }
        .input-area input::placeholder {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: clamp(11px, 3vw, 13px);
        }
        .btn-send {
            background: linear-gradient(135deg, #712375 0%, #9b4d9e 100%);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            font-size: clamp(12px, 3.5vw, 14px);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-send:active {
            transform: scale(0.97);
        }

        /* Responsive HP */
        @media (max-width: 550px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                top: 0;
                transition: left 0.3s ease;
                z-index: 20;
            }
            .sidebar.open {
                left: 0;
            }
            .menu-toggle {
                display: block;
                background: #712375;
                border: none;
                color: white;
                padding: 8px 12px;
                border-radius: 8px;
                margin-right: 10px;
                cursor: pointer;
            }
        }

        .menu-toggle {
            display: none;
        }

        @media (min-width: 551px) {
            .menu-toggle {
                display: none;
            }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- INTRO BOOTING SCREEN -->
    <div class="intro-screen" id="introScreen">
        <div class="intro-content">
            <div class="intro-text">
                <span class="booting-text">Zyths AI is booting</span>
                <span class="dots">
                    <span>.</span>
                    <span>.</span>
                    <span>.</span>
                </span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">☰</button>
                    <h1>Zyths AI</h1>
                </div>
                <button class="api-system-btn" id="apiSystemBtn">API System</button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-name">Zyths AI</div>
                    <div class="bubble">
                        Halo!, saya Zyths AI. Ada yang bisa saya bantu?
                    </div>
                </div>
            </div>

            <div class="api-input" id="apiInputContainer">
                <input type="text" id="apiKeyInput" placeholder="Masukkan API Key Google Gemini disini..." autocomplete="off">
                <button id="saveApiBtn">Simpan</button>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ketik pertanyaanmu di sini..." autofocus>
                <button class="btn-send" id="sendBtn">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        // === INTRO BOOTING 5 DETIK ===
        const introScreen = document.getElementById('introScreen');
        setTimeout(() => {
            introScreen.classList.add('hide');
        }, 5000);

        // === MANAJEMEN CHAT THREADS ===
        let chats = [];
        let activeChatId = null;
        let API_KEY = localStorage.getItem('zythsai_api_key') || '';

        function loadChats() {
            const saved = localStorage.getItem('zythsai_chats');
            if (saved) {
                chats = JSON.parse(saved);
            } else {
                chats = [{
                    id: Date.now().toString(),
                    title: "Obrolan Baru",
                    messages: [
                        { role: "assistant", content: "Halo!, saya Zyths AI. Ada yang bisa saya bantu?" }
                    ],
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                }];
            }
            activeChatId = localStorage.getItem('zythsai_activeChat') || chats[0]?.id;
            if (!chats.find(c => c.id === activeChatId) && chats.length > 0) {
                activeChatId = chats[0].id;
            }
            saveChats();
            renderChatList();
            renderCurrentChat();
        }

        function saveChats() {
            localStorage.setItem('zythsai_chats', JSON.stringify(chats));
            localStorage.setItem('zythsai_activeChat', activeChatId);
        }

        function renderChatList() {
            const container = document.getElementById('chatList');
            if (!container) return;
            container.innerHTML = '';
            chats.forEach(chat => {
                const chatDiv = document.createElement('div');
                chatDiv.className = `chat-item ${chat.id === activeChatId ? 'active' : ''}`;
                chatDiv.innerHTML = `
                    <span class="chat-title">${escapeHtml(chat.title)}</span>
                    <button class="delete-chat" data-id="${chat.id}">🗑️</button>
                `;
                chatDiv.querySelector('.chat-title').addEventListener('click', () => {
                    activeChatId = chat.id;
                    saveChats();
                    renderChatList();
                    renderCurrentChat();
                    closeSidebarOnMobile();
                });
                chatDiv.querySelector('.delete-chat').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (chats.length === 1) {
                        alert("Tidak bisa menghapus obrolan terakhir!");
                        return;
                    }
                    chats = chats.filter(c => c.id !== chat.id);
                    if (activeChatId === chat.id) {
                        activeChatId = chats[0].id;
                    }
                    saveChats();
                    renderChatList();
                    renderCurrentChat();
                });
                container.appendChild(chatDiv);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderCurrentChat() {
            const chat = chats.find(c => c.id === activeChatId);
            if (!chat) return;
            
            const container = document.getElementById('chatMessages');
            if (!container) return;
            container.innerHTML = '';
            chat.messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
                const nameSpan = document.createElement('div');
                nameSpan.className = 'message-name';
                nameSpan.textContent = msg.role === 'user' ? 'Kamu' : 'Zyths AI';
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'bubble';
                if (msg.role === 'user') {
                    bubbleDiv.innerHTML = msg.content.replace(/\n/g, '<br>');
                } else {
                    bubbleDiv.innerHTML = parseMarkdown(msg.content);
                }
                messageDiv.appendChild(nameSpan);
                messageDiv.appendChild(bubbleDiv);
                container.appendChild(messageDiv);
            });
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: "Obrolan Baru",
                messages: [
                    { role: "assistant", content: "Halo!, saya Zyths AI. Ada yang bisa saya bantu?" }
                ],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            chats.unshift(newChat);
            activeChatId = newChat.id;
            saveChats();
            renderChatList();
            renderCurrentChat();
        }

        function addMessageToChat(text, isUser = true) {
            const chat = chats.find(c => c.id === activeChatId);
            if (!chat) return;
            
            chat.messages.push({
                role: isUser ? 'user' : 'assistant',
                content: text,
                timestamp: new Date().toISOString()
            });
            chat.updatedAt = new Date().toISOString();
            
            if (isUser && chat.messages.filter(m => m.role === 'user').length === 1) {
                let newTitle = text.slice(0, 30);
                if (text.length > 30) newTitle += '...';
                chat.title = newTitle;
            }
            
            saveChats();
            renderChatList();
            renderCurrentChat();
        }

        function parseMarkdown(text) {
            let html = text;
            html = html.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
            html = html.replace(/^(\*\*\*|---)$/gm, '<hr>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/(?<!\*)\*(?!\s)([^*]+?)(?<!\s)\*(?!\*)/g, '<em>$1</em>');
            
            let lines = html.split('\n');
            let inList = false;
            let resultLines = [];
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let listMatch = line.match(/^[\*\-\•]\s+(.+)$/);
                if (listMatch) {
                    if (!inList) {
                        resultLines.push('<ul>');
                        inList = true;
                    }
                    resultLines.push(`<li>${listMatch[1]}</li>`);
                } else {
                    if (inList) {
                        resultLines.push('</ul>');
                        inList = false;
                    }
                    resultLines.push(line);
                }
            }
            if (inList) resultLines.push('</ul>');
            html = resultLines.join('\n');
            
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            html = html.replace(/^###\s*/gm, '');
            html = html.replace(/^##\s*/gm, '');
            html = html.replace(/^#\s*/gm, '');
            html = html.replace(/\*{1,2}/g, '');
            html = html.replace(/\n/g, '<br>');
            html = html.replace(/<(ul|ol)><br>/g, '<$1>');
            html = html.replace(/<br><\/(ul|ol)>/g, '</$1>');
            html = html.replace(/<li><br>/g, '<li>');
            html = html.replace(/<br><\/li>/g, '</li>');
            return html;
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-name">Zyths AI</div>
                <div class="typing-indicator"><span></span><span></span><span></span></div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function callGeminiAPI(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API Error');
            }
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function sendMessage() {
            const message = document.getElementById('userInput').value.trim();
            if (!message) return;
            
            if (!API_KEY) {
                addMessageToChat("⚠️ Masukkan API Key Google Gemini dulu di bagian atas!", false);
                document.getElementById('userInput').value = '';
                return;
            }
            
            addMessageToChat(message, true);
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').blur();
            
            showTyping();
            try {
                const response = await callGeminiAPI(message);
                hideTyping();
                addMessageToChat(response, false);
            } catch (error) {
                hideTyping();
                console.error(error);
                addMessageToChat(`❌ ${error.message}`, false);
            }
        }

        // === EVENT LISTENERS ===
        document.getElementById('newChatBtn').addEventListener('click', () => {
            createNewChat();
            closeSidebarOnMobile();
        });
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        const apiInputContainer = document.getElementById('apiInputContainer');
        if (API_KEY) {
            apiInputContainer.classList.add('hide');
        }
        
        document.getElementById('apiSystemBtn').addEventListener('click', () => {
            if (confirm("Reset API Key? Kamu harus memasukkan API Key baru untuk menggunakan Zyths AI.")) {
                localStorage.removeItem('zythsai_api_key');
                API_KEY = '';
                apiInputContainer.classList.remove('hide');
                document.getElementById('apiKeyInput').value = '';
                addMessageToChat("🔑 API Key telah direset. Masukkan API Key baru untuk melanjutkan.", false);
            }
        });
        
        document.getElementById('saveApiBtn').addEventListener('click', () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key && key.startsWith("AIza")) {
                API_KEY = key;
                localStorage.setItem('zythsai_api_key', key);
                apiInputContainer.classList.add('hide');
                addMessageToChat("✅ API Key berhasil disimpan! Sekarang aku bisa jawab apa saja. Coba tanyakan sesuatu!", false);
            } else {
                addMessageToChat("❌ API Key tidak valid! Pastikan API Key Google Gemini-mu benar (dimulai dengan 'AIza').", false);
            }
        });

        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        function closeSidebarOnMobile() {
            if (window.innerWidth <= 550) {
                sidebar.classList.remove('open');
            }
        }
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
        }
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 550 && sidebar && !sidebar.contains(e.target) && menuToggle && !menuToggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        loadChats();
        document.getElementById('userInput').focus();
    </script>
</body>
    </html>
