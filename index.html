<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Zyths AI - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background: linear-gradient(135deg, #1a0a1a 0%, #2d1a2d 100%);
            font-family: 'Poppins', 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 100%;
        }

        /* --- INTRO BOOTING SCREEN --- */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a0a1a 0%, #2d1a2d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .intro-screen.hide {
            opacity: 0;
            visibility: hidden;
        }
        .intro-content {
            text-align: center;
        }
        .intro-text {
            color: #e8b0e8;
            font-size: clamp(1rem, 6vw, 1.5rem);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .booting-text {
            margin-right: 8px;
        }
        .dots {
            display: inline-flex;
            gap: 6px;
        }
        .dots span {
            font-size: clamp(1rem, 6vw, 1.5rem);
            animation: softBlink 2s infinite ease-in-out;
            opacity: 0;
            display: inline-block;
        }
        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.4s; }
        .dots span:nth-child(3) { animation-delay: 0.8s; }

        @keyframes softBlink {
            0%, 100% { opacity: 0.15; transform: translateY(0);}
            50% { opacity: 1; transform: translateY(-3px);}
        }

        /* --- MAIN CHAT CONTAINER --- */
        .chat-container {
            width: 100%;
            max-width: 500px;
            background: #2d1a2d;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
            border: 2px solid #712375;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.6s ease;
            height: 85vh;
            max-height: 85vh;
        }
        .chat-container.visible {
            opacity: 1;
        }

        /* --- HEADER DENGAN TOMBOL API SYSTEM --- */
        .chat-header {
            background: linear-gradient(135deg, #712375 0%, #4a1a4d 100%);
            padding: 14px 20px;
            border-bottom: 2px solid #9b4d9e;
            text-align: center;
            flex-shrink: 0;
            position: relative;
        }
        .chat-header h1 {
            color: #e8b0e8;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            letter-spacing: -0.3px;
        }
        .api-system-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid #9b4d9e;
            color: #e8b0e8;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .api-system-btn:hover {
            background: rgba(155, 77, 158, 0.5);
            transform: translateY(-50%) scale(1.02);
        }
        .api-system-btn:active {
            transform: translateY(-48%) scale(0.98);
        }

        /* --- AREA PESAN (MEMANJANG) --- */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #2a122a;
            min-height: 0;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #4a1a4d;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #9b4d9e;
            border-radius: 10px;
        }

        /* --- BUBBLE CHAT --- */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.user { align-self: flex-end; }
        .message.bot { align-self: flex-start; }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: clamp(12px, 3.5vw, 14px);
            line-height: 1.45;
            word-wrap: break-word;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #712375 0%, #9b4d9e 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message.bot .bubble {
            background: #4a1a4d;
            color: #e8b0e8;
            border-bottom-left-radius: 5px;
            border: 1px solid #712375;
        }
        .message-name {
            font-size: clamp(9px, 3vw, 10px);
            margin-bottom: 4px;
            padding-left: 8px;
            color: #b86bb8;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }
        .message.user .message-name {
            text-align: right;
            color: #c97bc9;
        }

        /* --- TYPING INDICATOR --- */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 10px 14px;
            background: #4a1a4d;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            width: fit-content;
            border: 1px solid #712375;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #e8b0e8;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* --- API INPUT (HIDE jika sudah tersimpan) --- */
        .api-input {
            background: #2a122a;
            padding: 10px 12px;
            border-top: 1px solid #4a1a4d;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .api-input.hide {
            display: none;
        }
        .api-input input {
            flex: 1;
            background: #1a0a1a;
            border: 1px solid #712375;
            color: #e8b0e8;
            padding: 8px 12px;
            border-radius: 25px;
            font-size: 11px;
            font-family: 'Inter', monospace;
            outline: none;
        }
        .api-input input::placeholder {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
        }
        .api-input button {
            background: #4a1a4d;
            border: 1px solid #712375;
            color: #e8b0e8;
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            font-size: 11px;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .api-input button:hover { background: #712375; }

        /* --- INPUT AREA (KIRIM PESAN) --- */
        .input-area {
            background: #2d1a2d;
            padding: 12px;
            border-top: 2px solid #712375;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #1a0a1a;
            border: 2px solid #712375;
            color: #e8b0e8;
            padding: 10px 14px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: clamp(12px, 3.5vw, 14px);
            outline: none;
            min-width: 0;
        }
        .input-area input:focus { border-color: #9b4d9e; }
        .input-area input::placeholder {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: clamp(11px, 3vw, 13px);
        }
        .btn-send {
            background: linear-gradient(135deg, #712375 0%, #9b4d9e 100%);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            font-size: clamp(12px, 3.5vw, 14px);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-send:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            body { padding: 8px; }
            .chat-container { border-radius: 20px; height: 85vh; max-height: 85vh; }
            .chat-messages { padding: 12px; }
            .input-area { padding: 10px; }
            .api-input { padding: 8px 10px; }
            .api-system-btn { padding: 3px 10px; font-size: 9px; }
        }

        @media (max-width: 360px) {
            .chat-messages { padding: 10px; }
            .bubble { padding: 8px 12px; }
            .chat-header { padding: 10px 16px; }
        }
    </style>
</head>
<body>

    <!-- INTRO BOOTING SCREEN -->
    <div class="intro-screen" id="introScreen">
        <div class="intro-content">
            <div class="intro-text">
                <span class="booting-text">Zyths AI is booting</span>
                <span class="dots">
                    <span>.</span>
                    <span>.</span>
                    <span>.</span>
                </span>
            </div>
        </div>
    </div>

    <!-- MAIN CHAT CONTAINER -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <h1>Zyths AI</h1>
            <button class="api-system-btn" id="apiSystemBtn">API System</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-name">Zyths AI</div>
                <div class="bubble">
                    Halo! Aku Zyths AI versi online.<br>
                    Masukkan API Key Google-mu di bawah, lalu aku bisa jawab apa saja.
                </div>
            </div>
        </div>

        <div class="api-input" id="apiInputContainer">
            <input type="text" id="apiKeyInput" placeholder="Masukkan API Key Google Gemini disini..." autocomplete="off">
            <button id="saveApiBtn">Simpan</button>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ketik pesanmu disini..." autofocus>
            <button class="btn-send" id="sendBtn">Kirim</button>
        </div>
    </div>

    <script>
        const introScreen = document.getElementById('introScreen');
        const chatContainer = document.getElementById('chatContainer');
        const apiInputContainer = document.getElementById('apiInputContainer');
        const apiSystemBtn = document.getElementById('apiSystemBtn');

        // CEK APAKAH API KEY SUDAH TERSIMPAN
        let API_KEY = localStorage.getItem('zythsai_api_key') || '';

        // Jika sudah ada API Key, sembunyikan input API
        if (API_KEY) {
            apiInputContainer.classList.add('hide');
        }

        setTimeout(() => {
            introScreen.classList.add('hide');
            chatContainer.classList.add('visible');
        }, 5000);

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveApiBtn = document.getElementById('saveApiBtn');

        // TOMBOL API SYSTEM - RESET API KEY
        apiSystemBtn.addEventListener('click', () => {
            if (confirm("Reset API Key? Kamu harus memasukkan API Key baru untuk menggunakan Zyths AI.")) {
                localStorage.removeItem('zythsai_api_key');
                API_KEY = '';
                apiInputContainer.classList.remove('hide');
                apiKeyInput.value = '';
                addMessage("🔑 API Key telah direset. Masukkan API Key baru untuk melanjutkan.", false);
            }
        });

        // Simpan API Key
        saveApiBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key && key.startsWith("AIza")) {
                API_KEY = key;
                localStorage.setItem('zythsai_api_key', key);
                apiInputContainer.classList.add('hide'); // Sembunyikan input API
                addMessage("✅ API Key berhasil disimpan! Sekarang aku bisa jawab apa saja. Coba tanyakan sesuatu!", false);
            } else {
                addMessage("❌ API Key tidak valid! Pastikan API Key Google Gemini-mu benar (dimulai dengan 'AIza').", false);
            }
        });

        function addMessage(text, isUser = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            const nameSpan = document.createElement('div');
            nameSpan.className = 'message-name';
            nameSpan.textContent = isUser ? 'Kamu' : 'Zyths AI';
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.innerHTML = text.replace(/\n/g, '<br>');
            messageDiv.appendChild(nameSpan);
            messageDiv.appendChild(bubbleDiv);
            chatMessages.appendChild(messageDiv);
            requestAnimationFrame(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            const nameSpan = document.createElement('div');
            nameSpan.className = 'message-name';
            nameSpan.textContent = 'Zyths AI';
            const typingBubble = document.createElement('div');
            typingBubble.className = 'typing-indicator';
            typingBubble.innerHTML = '<span></span><span></span><span></span>';
            typingDiv.appendChild(nameSpan);
            typingDiv.appendChild(typingBubble);
            chatMessages.appendChild(typingDiv);
            requestAnimationFrame(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function callGeminiAPI(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API Error');
            }
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // Cek apakah API Key ada
            if (!API_KEY) {
                addMessage("⚠️ Masukkan API Key Google Gemini dulu di bagian atas!", false);
                return;
            }
            
            addMessage(message, true);
            userInput.value = '';
            showTyping();
            try {
                const response = await callGeminiAPI(message);
                hideTyping();
                addMessage(response, false);
            } catch (error) {
                hideTyping();
                console.error(error);
                if (error.message.includes('API key not valid')) {
                    addMessage("❌ API Key tidak valid! Periksa kembali.", false);
                } else if (error.message.includes('quota')) {
                    addMessage("⚠️ Kuota API habis. Coba lagi nanti atau gunakan API Key lain.", false);
                } else {
                    addMessage("❌ Terjadi kesalahan. Cek koneksi internet atau API Key-mu.", false);
                }
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        userInput.focus();
    </script>
</body>
    </html>
